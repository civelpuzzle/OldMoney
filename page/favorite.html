<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Желаемое | Old Money Collections</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-logo" onclick="window.location.href='main.html';">
            <i class="fas fa-crown logo-icon"></i>
            <span class="logo-text">OLD MONEY</span>
            <span class="logo-sub">EST. 1905</span>
        </div>
    </header>

    <main>
        <div class="burger-container">
            <div class="burger">
                <button type="button" onclick="window.location.href='main.html';"><i class="fas fa-home"></i> Главная</button>
                <button type="button" class="active"><i class="fas fa-heart"></i> Желаемое</button>
                <button type="button" onclick="window.location.href='search.html';"><i class="fas fa-search"></i> Поиск</button>
                <button type="button" id="collapseMenuBtn"><i class="fas fa-compress-alt"></i> Свернуть</button>
            </div>
            <div class="burger-trigger" id="expandMenuBtn">
                <span class="trigger-icon">☰</span>
                <span>МЕНЮ</span>
            </div>
        </div>

        <div class="mainContainer" id="mainContainer">
            <div class="page-header">
                <h1><i class="fas fa-heart" style="color: var(--gold); margin-right: 12px;"></i> Желаемое</h1>
                <span class="wishlist-count" id="wishlistCount">0 предметов</span>
            </div>
            <div id="wishlistContent">
                <div class="skeleton-element skeleton"></div>
                <div class="skeleton-element skeleton"></div>
                <div class="skeleton-element skeleton"></div>
            </div>
        </div>
    </main>

    <footer>
        <span>© 2026 OLD MONEY — Избранные коллекции</span>
    </footer>

    <div class="modal" id="datePickerModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Выберите дату приобретения</h3>
                <button class="modal-close" onclick="closeDateModal()">&times;</button>
            </div>
            <div class="form-group">
                <label class="form-label">Дата получения предмета</label>
                <input type="date" class="form-input" id="acquisitionDatePicker" value="">
            </div>
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="closeDateModal()">Отмена</button>
                <button class="btn btn-primary" id="confirmDateBtn">Добавить в коллекцию</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000';

        function getAuthHeaders() {
            const token = sessionStorage.getItem('token');
            return token ? { 'Authorization': `Bearer ${token}` } : {};
        }

        async function apiFetch(url, options = {}) {
            const res = await fetch(`${API_BASE}${url}`, {
                ...options,
                credentials: 'include',
                headers: { 'Content-Type': 'application/json', ...getAuthHeaders(), ...options.headers }
            });
            if (res.status === 302 || res.redirected) {
                sessionStorage.clear();
                window.location.href = 'logReg.html';
                throw new Error('Сессия истекла');
            }
            if (res.status === 401) {
                sessionStorage.clear();
                window.location.href = 'logReg.html';
                throw new Error('Не авторизован');
            }
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.message || err.error || `Ошибка ${res.status}`);
            }
            if (res.status === 204) {
                return null;
            }
            const data = await res.json();
            if (data && typeof data === 'object' && Array.isArray(data.items)) {
                return data.items;
            }
            return data;
        }

        let wishlistItems = [];

        function formatDate(dateStr) {
            if (!dateStr) return "";
            const d = new Date(dateStr);
            return d.toLocaleDateString('ru-RU');
        }

        function formatPrice(price) {
            return new Intl.NumberFormat('ru-RU').format(price) + " ₽";
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function getDeclension(n, one, two, five) {
            n = Math.abs(n) % 100;
            if (n >= 5 && n <= 20) return five;
            n %= 10;
            if (n === 1) return one;
            if (n >= 2 && n <= 4) return two;
            return five;
        }

        async function loadWishlist() {
            try {
                const data = await apiFetch('/api/wishlist/');
                wishlistItems = Array.isArray(data) ? data : (data.items || []);
                renderWishlist();
            } catch (err) {
                console.error(err);
            }
        }

        async function removeFromWishlist(id) {
            try {
                await apiFetch(`/api/wishlist/${id}/`, { method: 'DELETE' });
                await loadWishlist();
                localStorage.setItem('wishlistChanged', Date.now().toString());
            } catch (err) {
                console.error(err);
            }
        }

        let pendingAddItem = null;

        function openDatePicker(wishlistItem) {
            pendingAddItem = wishlistItem;
            const today = new Date().toISOString().slice(0,10);
            document.getElementById('acquisitionDatePicker').value = today;
            document.getElementById('datePickerModal').classList.add('active');
        }

        function closeDateModal() {
            document.getElementById('datePickerModal').classList.remove('active');
            pendingAddItem = null;
        }

        async function addToMainCollectionWithDate(wishlistItem, acquisitionDate) {
            if (wishlistItem.price <= 0) {
                alert('Невозможно добавить предмет: цена должна быть положительным числом.');
                return;
            }
            try {
                await apiFetch('/api/items/create/', {
                    method: 'POST',
                    body: JSON.stringify({
                        name: wishlistItem.name,
                        category: wishlistItem.category,
                        price: wishlistItem.price,
                        acquisitionDate: acquisitionDate
                    })
                });
                await removeFromWishlist(wishlistItem.id);
                localStorage.setItem('collectionChanged', Date.now().toString());
            } catch (err) {
                console.error(err);
            }
        }

        function renderWishlist() {
            const container = document.getElementById('wishlistContent');
            const countSpan = document.getElementById('wishlistCount');
            if (!container) return;
            if (wishlistItems.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="far fa-heart"></i>
                        <p>Ваш список желаемого пуст</p>
                        <p class="empty-sub">Добавляйте понравившиеся предметы из поиска</p>
                    </div>
                `;
                if (countSpan) countSpan.textContent = '0 предметов';
                return;
            }
            container.innerHTML = `
                <div class="wishlist-items-container">
                    ${wishlistItems.map(item => `
                        <div class="wishlist-item" data-id="${item.id}">
                            <span class="item-name">${escapeHtml(item.name)}</span>
                            <span class="item-category">${escapeHtml(item.category || 'Без категории')}</span>
                            <span class="item-price">${formatPrice(item.price)}</span>
                            <span class="item-date">${formatDate(item.acquisition_date)}</span>
                            <div class="item-actions">
                                <button class="action-btn add-to-collection-btn" data-id="${item.id}" title="Добавить в коллекцию"><i class="fas fa-plus-circle"></i></button>
                                <button class="action-btn remove-btn" data-id="${item.id}" title="Удалить"><i class="fas fa-times"></i></button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            if (countSpan) countSpan.textContent = `${wishlistItems.length} ${getDeclension(wishlistItems.length, 'предмет', 'предмета', 'предметов')}`;
            
            document.querySelectorAll('.add-to-collection-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.dataset.id);
                    const item = wishlistItems.find(i => i.id === id);
                    if (item) openDatePicker(item);
                });
            });
            document.querySelectorAll('.remove-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.dataset.id);
                    removeFromWishlist(id);
                });
            });
        }

        document.getElementById('confirmDateBtn').addEventListener('click', async () => {
            if (pendingAddItem) {
                const newDate = document.getElementById('acquisitionDatePicker').value;
                if (!newDate) return;
                await addToMainCollectionWithDate(pendingAddItem, newDate);
                closeDateModal();
            }
        });

        const mainElement = document.querySelector('main');
        const collapseMenuBtn = document.getElementById('collapseMenuBtn');
        const expandMenuBtn = document.getElementById('expandMenuBtn');
        function collapseMenu() { if (!mainElement.classList.contains('menu-collapsed')) { mainElement.classList.add('menu-collapsed'); localStorage.setItem('menuCollapsedFavorite', 'true'); } }
        function expandMenu() { if (mainElement.classList.contains('menu-collapsed')) { mainElement.classList.remove('menu-collapsed'); localStorage.setItem('menuCollapsedFavorite', 'false'); } }
        if (collapseMenuBtn) collapseMenuBtn.addEventListener('click', collapseMenu);
        if (expandMenuBtn) expandMenuBtn.addEventListener('click', expandMenu);
        if (localStorage.getItem('menuCollapsedFavorite') === 'true') mainElement.classList.add('menu-collapsed');

        function adjustTriggerHeight() {
            const trigger = document.getElementById('expandMenuBtn');
            const mainCont = document.querySelector('.mainContainer');
            if (trigger && mainCont && window.innerWidth > 768) {
                trigger.style.minHeight = Math.min(Math.max(mainCont.offsetHeight, 250), 700) + 'px';
            }
        }

        window.addEventListener('load', async () => {
            if (!sessionStorage.getItem('userId') && !sessionStorage.getItem('token')) {
                window.location.href = 'logReg.html';
                return;
            }
            await loadWishlist();
            adjustTriggerHeight();
        });
        window.addEventListener('resize', adjustTriggerHeight);
    </script>
</body>
</html>
