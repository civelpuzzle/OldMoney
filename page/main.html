<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MainPage | Old Money Collections</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-logo" id="headerLogo">
            <i class="fas fa-crown logo-icon"></i>
            <span class="logo-text">OLD MONEY</span>
            <span class="logo-sub">EST. 1905</span>
        </div>
    </header>

    <main>
        <div class="burger-container">
            <div class="burger">
                <button type="button" data-page="main"><i class="fas fa-home"></i> Главная</button>
                <button type="button" onclick="window.location.href='favorite.html'"><i class="far fa-heart"></i> Желаемое</button>
                <button type="button" onclick="window.location.href='search.html'"><i class="fas fa-search"></i> Поиск</button>
                <button type="button" id="addItemBtn"><i class="fas fa-plus-circle"></i> Добавить предмет</button>
                <button type="button" id="exportImportBtn"><i class="fas fa-file-export"></i> Импорт / Экспорт</button>
                <button type="button" id="collapseMenuBtn"><i class="fas fa-compress-alt"></i> Свернуть</button>
            </div>
            <div class="burger-trigger" id="expandMenuBtn">
                <span class="trigger-icon">☰</span>
                <span>МЕНЮ</span>
            </div>
        </div>

        <div class="mainContainer" id="mainContainer">
            <div class="skeleton-element skeleton"></div>
            <div class="skeleton-element skeleton"></div>
            <div class="skeleton-element skeleton"></div>
        </div>

        <div class="userWidget" id="userWidget">
            <i class="fas fa-crown iconInfo" style="font-size: 80px; color: var(--gold); display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--green), var(--green-light)); border-radius: 50%;"></i>
            <div class="userInfo-text" id="userInfo">
                <div class="skeleton" style="height: 30px; width: 200px; margin: 10px auto;"></div>
                <div class="skeleton" style="height: 25px; width: 180px; margin: 10px auto;"></div>
            </div>
            <div class="stats-info" id="statsInfo">
                <p><i class="fas fa-box"></i> Всего предметов: <span id="totalItemsCount">0</span></p>
                <p><i class="fas fa-coins"></i> Общая стоимость: <span id="totalValue">0 ₽</span></p>
            </div>
        </div>
    </main>

    <footer>
        <span>© 2026 OLD MONEY — Коллекции вне времени</span>
    </footer>

    <!-- Модальное окно: Добавить предмет -->
    <div class="modal" id="addItemModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Добавить предмет</h3>
                <button class="modal-close" onclick="closeModal('addItemModal')">&times;</button>
            </div>
            <form id="addItemForm">
                <div class="form-group">
                    <label class="form-label">Название предмета</label>
                    <input type="text" class="form-input" id="itemName" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Категория / Тип коллекции</label>
                    <div class="category-row">
                        <select class="form-select" id="categorySelect">
                            <option value="">Выберите из списка</option>
                            <option value="Часы">Часы</option>
                            <option value="Живопись">Живопись</option>
                            <option value="Фотография">Фотография</option>
                            <option value="Скульптура">Скульптура</option>
                            <option value="Книги">Книги</option>
                            <option value="Монеты">Монеты</option>
                            <option value="Аксессуары">Аксессуары</option>
                            <option value="Одежда">Одежда</option>
                            <option value="Антиквариат">Антиквариат</option>
                        </select>
                        <input type="text" class="form-input" id="itemCategory" placeholder="Или введите свою категорию">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Стоимость (₽)</label>
                    <input type="number" class="form-input" id="itemPrice" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Дата получения</label>
                    <input type="date" class="form-input" id="itemDate" required>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('addItemModal')">Отмена</button>
                    <button type="submit" class="btn btn-primary">Добавить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Модальное окно: Импорт / Экспорт -->
    <div class="modal" id="exportImportModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Импорт / Экспорт отчёта</h3>
                <button class="modal-close" onclick="closeModal('exportImportModal')">&times;</button>
            </div>
            <div class="form-group">
                <label class="form-label">Тип отчёта</label>
                <div class="report-options">
                    <div class="report-option selected" data-type="all">
                        <div class="report-option-icon">📊</div>
                        <div class="report-option-label">Все предметы</div>
                    </div>
                    <div class="report-option" data-type="category">
                        <div class="report-option-icon">📁</div>
                        <div class="report-option-label">По категориям</div>
                    </div>
                    <div class="report-option" data-type="period">
                        <div class="report-option-icon">📅</div>
                        <div class="report-option-label">За период</div>
                    </div>
                </div>
            </div>
            <div class="form-group" id="categorySelectGroup" style="display: none;">
                <label class="form-label">Категория</label>
                <select class="form-select" id="reportCategory"></select>
            </div>
            <div class="form-group" id="periodSelectGroup" style="display: none;">
                <label class="form-label">Период</label>
                <div style="display: flex; gap: 1rem;">
                    <input type="date" class="form-input" id="dateFrom">
                    <input type="date" class="form-input" id="dateTo">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Сортировка</label>
                <select class="form-select" id="sortType">
                    <option value="date-desc">По дате (новые)</option>
                    <option value="date-asc">По дате (старые)</option>
                    <option value="price-desc">По стоимости (дорогие)</option>
                    <option value="price-asc">По стоимости (дешёвые)</option>
                    <option value="name-asc">По названию (А-Я)</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Формат экспорта</label>
                <select class="form-select" id="exportFormat">
                    <option value="csv">CSV (Excel)</option>
                    <option value="json">JSON</option>
                </select>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="closeModal('exportImportModal')">Отмена</button>
                <button type="button" class="btn btn-primary" id="exportReportBtn">Выгрузить отчёт</button>
                <button type="button" class="btn btn-gold" id="importDataBtn">Импорт данных</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000';

        function getAuthHeaders() {
            const token = sessionStorage.getItem('token');
            return token ? { 'Authorization': `Bearer ${token}` } : {};
        }

        async function apiFetch(url, options = {}) {
            const res = await fetch(`${API_BASE}${url}`, {
                ...options,
                credentials: 'include',
                headers: { 'Content-Type': 'application/json', ...getAuthHeaders(), ...options.headers }
            });
            if (res.status === 302 || res.redirected) {
                sessionStorage.clear();
                window.location.href = 'logReg.html';
                throw new Error('Сессия истекла');
            }
            if (res.status === 401) {
                sessionStorage.clear();
                window.location.href = 'logReg.html';
                throw new Error('Не авторизован');
            }
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.message || err.error || `Ошибка ${res.status}`);
            }
            if (res.status === 204) {
                return null;
            }
            const data = await res.json();
            if (data && typeof data === 'object' && Array.isArray(data.items)) {
                return data.items;
            }
            return data;
        }

        let items = [];

        function formatDate(dateStr) {
            if (!dateStr) return "";
            const d = new Date(dateStr);
            return d.toLocaleDateString('ru-RU');
        }

        function formatPrice(price) {
            return new Intl.NumberFormat('ru-RU').format(price) + " ₽";
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function renderItems() {
            const container = document.getElementById('mainContainer');
            if (!container) return;
            if (items.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-box-open" style="font-size: 48px;"></i><p>Коллекция пуста. Добавьте первый предмет!</p></div>`;
                updateStats();
                return;
            }
            container.innerHTML = items.map(item => `
                <div class="mainContainer-element" data-id="${item.id}">
                    <span class="item-name">${escapeHtml(item.name)}</span>
                    <span class="item-category">${escapeHtml(item.category)}</span>
                    <span class="item-price">${formatPrice(item.price)}</span>
                    <span class="item-date">${formatDate(item.acquisition_date)}</span>
                    <button class="delete-btn" data-id="${item.id}" title="Удалить предмет"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');
            
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.dataset.id);
                    if (confirm('Удалить предмет из коллекции?')) {
                        await removeItemById(id);
                    }
                });
            });
            updateStats();
        }

        async function loadItems() {
            try {
                const data = await apiFetch('/api/items/');
                items = Array.isArray(data) ? data : (data.items || []);
                renderItems();
            } catch (err) {
                console.error(err);
            }
        }

        async function removeItemById(id) {
            try {
                await apiFetch(`/api/items/${id}/delete/`, { method: 'DELETE' });
                await loadItems();
                localStorage.setItem('collectionChanged', Date.now().toString());
            } catch (err) {
                console.error(err);
            }
        }

        async function updateStats() {
            try {
                const stats = await apiFetch('/api/stats/');
                document.getElementById('totalItemsCount').innerText = stats.total_items || 0;
                document.getElementById('totalValue').innerText = formatPrice(stats.total_value || 0);
            } catch (err) {
                console.error(err);
            }
        }

        async function loadUserInfo() {
            const userId = sessionStorage.getItem('userId');
            if (!userId) {
                console.warn('userId не найден в sessionStorage');
                document.getElementById('userInfo').innerHTML = '<p>Ошибка: не удалось определить пользователя</p>';
                return;
            }
            try {
                const profile = await apiFetch(`/api/users/${userId}/`);
                const userDiv = document.getElementById('userInfo');
                userDiv.innerHTML = `
                    <p class="user-name">Здравствуйте, ${escapeHtml(profile.username)}!</p>
                    <p class="user-date">Дата регистрации: ${formatDate(profile.registration_date)}</p>
                `;
            } catch (err) {
                console.error(err);
                document.getElementById('userInfo').innerHTML = '<p>Ошибка загрузки профиля</p>';
            }
        }

        async function updateCategorySelect() {
            try {
                const cats = await apiFetch('/api/categories/');
                const select = document.getElementById('reportCategory');
                select.innerHTML = '<option value="all">Все категории</option>' + (Array.isArray(cats) ? cats.map(c => `<option value="${c}">${c}</option>`).join('') : '');
            } catch (err) {
                console.error(err);
            }
        }

        function initReportTypeSwitcher() {
            const options = document.querySelectorAll('.report-option');
            const categoryGroup = document.getElementById('categorySelectGroup');
            const periodGroup = document.getElementById('periodSelectGroup');
            
            options.forEach(opt => {
                opt.addEventListener('click', () => {
                    options.forEach(o => o.classList.remove('selected'));
                    opt.classList.add('selected');
                    const type = opt.dataset.type;
                    
                    if (type === 'category') {
                        categoryGroup.style.display = 'block';
                        periodGroup.style.display = 'none';
                    } else if (type === 'period') {
                        categoryGroup.style.display = 'none';
                        periodGroup.style.display = 'block';
                    } else {
                        categoryGroup.style.display = 'none';
                        periodGroup.style.display = 'none';
                    }
                });
            });
        }

        document.getElementById('addItemForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('itemName').value.trim();
            let category = document.getElementById('itemCategory').value.trim();
            const categorySelect = document.getElementById('categorySelect');
            if (!category && categorySelect.value) category = categorySelect.value;
            const price = parseFloat(document.getElementById('itemPrice').value);
            const date = document.getElementById('itemDate').value;
            if (!name || !category || isNaN(price) || !date) return;
            if (price <= 0) {
                alert('Стоимость предмета должна быть положительным числом!');
                return;
            }
            try {
                await apiFetch('/api/items/create/', {
                    method: 'POST',
                    body: JSON.stringify({ name, category, price, acquisitionDate: date })
                });
                await loadItems();
                closeModal('addItemModal');
                document.getElementById('addItemForm').reset();
                localStorage.setItem('collectionChanged', Date.now().toString());
            } catch (err) {
                console.error(err);
            }
        });

        document.getElementById('exportReportBtn').addEventListener('click', async () => {
            const selectedOption = document.querySelector('.report-option.selected');
            if (!selectedOption) return;
            const type = selectedOption.dataset.type;
            const sort = document.getElementById('sortType').value;
            const format = document.getElementById('exportFormat').value;
            let url = `/api/export/?format=${format}&sort=${sort}`;
            
            if (type === 'category') {
                const cat = document.getElementById('reportCategory').value;
                if (cat && cat !== 'all') {
                    url += `&category=${encodeURIComponent(cat)}`;
                }
            } else if (type === 'period') {
                const from = document.getElementById('dateFrom').value;
                const to = document.getElementById('dateTo').value;
                if (from) url += `&from=${from}`;
                if (to) url += `&to=${to}`;
            }
            
            try {
                const token = sessionStorage.getItem('token');
                const res = await fetch(`${API_BASE}${url}`, {
                    credentials: 'include',
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });
                if (!res.ok) throw new Error('Ошибка экспорта');
                const blob = await res.blob();
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `old_money_report_${new Date().toISOString().slice(0,10)}.${format}`;
                link.click();
                closeModal('exportImportModal');
            } catch (err) {
                console.error(err);
            }
        });

        document.getElementById('importDataBtn').addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.csv,.json';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    try {
                        let imported = [];
                        if (file.name.endsWith('.json')) {
                            imported = JSON.parse(ev.target.result);
                            if (!Array.isArray(imported)) throw new Error('Не массив');
                        } else if (file.name.endsWith('.csv')) {
                            const text = ev.target.result;
                            const lines = text.split('\n').slice(1);
                            for (let line of lines) {
                                if (!line.trim()) continue;
                                const parts = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                                if (parts && parts.length >= 4) {
                                    const name = parts[0].replace(/^"|"$/g, '');
                                    const category = parts[1].replace(/^"|"$/g, '');
                                    const price = parseFloat(parts[2]);
                                    const date = parts[3].replace(/^"|"$/g, '');
                                    if (name && category && !isNaN(price) && date) {
                                        imported.push({ name, category, price, acquisitionDate: date });
                                    }
                                }
                            }
                        }
                        if (!imported.length) throw new Error('Нет данных для импорта');

                        const validItems = imported.filter(item => item.price > 0);
                        const skippedCount = imported.length - validItems.length;
                        if (skippedCount > 0) {
                            alert(`Пропущено ${skippedCount} записей с неположительной ценой.`);
                        }
                        if (validItems.length === 0) {
                            throw new Error('Нет валидных предметов для импорта (цена должна быть > 0)');
                        }

                        let success = 0;
                        for (const item of validItems) {
                            try {
                                await apiFetch('/api/items/create/', {
                                    method: 'POST',
                                    body: JSON.stringify(item)
                                });
                                success++;
                            } catch (err) { console.warn(err); }
                        }
                        alert(`Импорт завершён. Добавлено ${success} предметов.`);
                        await loadItems();
                        closeModal('exportImportModal');
                        localStorage.setItem('collectionChanged', Date.now().toString());
                    } catch (err) {
                        console.error(err);
                        alert('Ошибка импорта: ' + err.message);
                    }
                };
                reader.readAsText(file, 'UTF-8');
            };
            input.click();
        });

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        window.closeModal = closeModal;

        document.getElementById('addItemBtn').addEventListener('click', () => openModal('addItemModal'));
        document.getElementById('exportImportBtn').addEventListener('click', async () => {
            await updateCategorySelect();
            openModal('exportImportModal');
        });

        const categorySelect = document.getElementById('categorySelect');
        const categoryInput = document.getElementById('itemCategory');
        if (categorySelect && categoryInput) {
            categorySelect.addEventListener('change', () => {
                if (categorySelect.value) categoryInput.value = categorySelect.value;
            });
        }

        const mainElement = document.querySelector('main');
        const collapseMenuBtn = document.getElementById('collapseMenuBtn');
        const expandMenuBtn = document.getElementById('expandMenuBtn');
        function collapseMenu() { if (!mainElement.classList.contains('menu-collapsed')) { mainElement.classList.add('menu-collapsed'); localStorage.setItem('menuCollapsed', 'true'); } }
        function expandMenu() { if (mainElement.classList.contains('menu-collapsed')) { mainElement.classList.remove('menu-collapsed'); localStorage.setItem('menuCollapsed', 'false'); } }
        if (collapseMenuBtn) collapseMenuBtn.addEventListener('click', collapseMenu);
        if (expandMenuBtn) expandMenuBtn.addEventListener('click', expandMenu);
        if (localStorage.getItem('menuCollapsed') === 'true') mainElement.classList.add('menu-collapsed');

        function adjustTriggerHeight() {
            const trigger = document.getElementById('expandMenuBtn');
            const mainCont = document.querySelector('.mainContainer');
            if (trigger && mainCont && window.innerWidth > 768) {
                trigger.style.minHeight = Math.min(Math.max(mainCont.offsetHeight, 250), 700) + 'px';
            }
        }

        window.addEventListener('storage', (e) => {
            if (e.key === 'collectionChanged' || e.key === 'wishlistChanged') {
                loadItems();
                updateStats();
            }
        });

        window.addEventListener('load', async () => {
            if (!sessionStorage.getItem('userId') && !sessionStorage.getItem('token')) {
                window.location.href = 'logReg.html';
                return;
            }
            await loadItems();
            await loadUserInfo();
            initReportTypeSwitcher();
            adjustTriggerHeight();
        });
        window.addEventListener('resize', adjustTriggerHeight);
        const observer = new MutationObserver(adjustTriggerHeight);
        if (document.getElementById('mainContainer')) observer.observe(document.getElementById('mainContainer'), { childList: true, subtree: true });
        
        document.querySelector('[data-page="main"]')?.addEventListener('click', () => loadItems());
        document.getElementById('headerLogo')?.addEventListener('click', () => loadItems());
    </script>
</body>
</html>
