        function searchUsersByItem(query) {
            if (!query.trim()) return [];
            const q = query.trim().toLowerCase();
            const results = [];
            for (let user of users) {
                const items = userItemsMap[user.id] || [];
                const matched = items.filter(item => item.name.toLowerCase().includes(q));
                if (matched.length > 0) {
                    results.push({ user, matchedItems: matched });
                }
            }
            return results;
        }

                const matchCount = res.matchedItems.length;
                return `
                <div class="user-card" data-id="${user.id}" data-query="${currentSearchQuery}">
                    <div class="user-avatar">${escapeHtml(user.initials)}</div>
                    <div class="user-info">
                        <div class="user-name">${escapeHtml(user.name)}</div>
                        <div class="user-stats">
                            <span><i class="fas fa-image"></i> ${userItemsMap[user.id]?.length || 0} предметов</span>
                            <span><i class="fas fa-search"></i> Найдено: ${matchCount}</span>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right" style="color: var(--gold);"></i>
                </div>
            `}).join('')}</div>`;
            if (countSpan) countSpan.textContent = `${results.length} ${getDeclension(results.length, 'пользователь', 'пользователя', 'пользователей')}`;
            
            document.querySelectorAll('.user-card').forEach(card => {
                card.addEventListener('click', () => {
                    const userId = parseInt(card.dataset.id);
                    const user = users.find(u => u.id === userId);
                    const query = card.dataset.query;
                    if (user) {
                        openUserItemsModal(user, query);
                    }
                });
            });
        }

        function openUserItemsModal(user, query) {
            const modal = document.getElementById('userItemsModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalList = document.getElementById('modalItemsList');
            const allItems = userItemsMap[user.id] || [];
            let itemsToShow = allItems;
            if (query && query.trim()) {
                const q = query.trim().toLowerCase();
                itemsToShow = allItems.filter(item => item.name.toLowerCase().includes(q));
            }
            modalTitle.textContent = `Коллекция ${user.name} (${itemsToShow.length} предметов)`;
            if (itemsToShow.length === 0) {
                modalList.innerHTML = '<div class="empty-state"><p>Нет предметов, соответствующих запросу.</p></div>';
            } else {
                modalList.innerHTML = `
                    <table class="items-table">
                        <thead><tr><th>Название</th><th>Категория</th><th>Стоимость</th><th>Дата</th><th></th></tr></thead>
                        <tbody>
                            ${itemsToShow.map(item => `
                                <tr>
                                    <td>${escapeHtml(item.name)}</td>
                                    <td>${escapeHtml(item.category)}</td>
                                    <td>${formatPrice(item.price)}</td>
                                    <td>${formatDate(item.acquisitionDate)}</td>
                                    <td><button class="add-to-wishlist-btn" data-item='${JSON.stringify(item)}'><i class="fas fa-heart"></i> В желаемое</button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                document.querySelectorAll('.add-to-wishlist-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const itemData = JSON.parse(btn.dataset.item);
                        addToWishlist(itemData);
                    });
                });
            }
            modal.classList.add('active');
        }

        function addToWishlist(item) {
            let wishlist = JSON.parse(localStorage.getItem('wishlistItems') || '[]');
            if (!wishlist.some(w => w.id === item.id)) {
                const newItem = {
                    id: item.id,
                    name: item.name,
                    category: item.category,
                    price: item.price,
                    acquisitionDate: item.acquisitionDate
                };
                wishlist.push(newItem);
                localStorage.setItem('wishlistItems', JSON.stringify(wishlist));
                showNotification('Добавлено в желаемое');
            } else {
                showNotification('Уже в желаемом', '#D1664A');
            }
        }

        function formatDate(dateStr) {
            if (!dateStr) return "";
            const d = new Date(dateStr);
            return d.toLocaleDateString('ru-RU');
        }

        function formatPrice(price) {
            return new Intl.NumberFormat('ru-RU').format(price) + " ₽";
        }

        function showNotification(message, bgColor = '#2C4A3E') {
            const notif = document.createElement('div');
            notif.textContent = message;
            notif.style.cssText = `
                position: fixed;
                bottom: 80px;
                right: 20px;
                background: ${bgColor};
                color: white;
                padding: 12px 24px;
                border-radius: 40px;
                font-size: 14px;
                z-index: 1000;
                animation: slideIn 0.3s ease;
                box-shadow: 0 4px 12px var(--shadow);
            `;
            document.body.appendChild(notif);
            setTimeout(() => {
                notif.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notif.remove(), 300);
            }, 2000);
        }

        function getDeclension(n, one, two, five) {
            n = Math.abs(n) % 100;
            if (n >= 5 && n <= 20) return five;
            n %= 10;
            if (n === 1) return one;
            if (n >= 2 && n <= 4) return two;
            return five;
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }
        window.closeModal = closeModal;

        function performSearch() {
            const searchInput = document.getElementById('searchInput');
            currentSearchQuery = searchInput?.value || '';
            const results = searchUsersByItem(currentSearchQuery);
            renderUsers(results);
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
            @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
        `;
        document.head.appendChild(style);

        const mainElement = document.querySelector('main');
        const collapseMenuBtn = document.getElementById('collapseMenuBtn');
        const expandMenuBtn = document.getElementById('expandMenuBtn');
        function collapseMenu() { if (!mainElement.classList.contains('menu-collapsed')) { mainElement.classList.add('menu-collapsed'); localStorage.setItem('menuCollapsedSearch', 'true'); } }
        function expandMenu() { if (mainElement.classList.contains('menu-collapsed')) { mainElement.classList.remove('menu-collapsed'); localStorage.setItem('menuCollapsedSearch', 'false'); } }
        if (collapseMenuBtn) collapseMenuBtn.addEventListener('click', collapseMenu);
        if (expandMenuBtn) expandMenuBtn.addEventListener('click', expandMenu);
        if (localStorage.getItem('menuCollapsedSearch') === 'true') mainElement.classList.add('menu-collapsed');

        function adjustTriggerHeight() {
            const trigger = document.getElementById('expandMenuBtn');
            const mainCont = document.querySelector('.mainContainer');
            if (trigger && mainCont && window.innerWidth > 768) {
                trigger.style.minHeight = Math.min(Math.max(mainCont.offsetHeight, 250), 700) + 'px';
            }
        }
        
        window.addEventListener('load', () => {
            const container = document.getElementById('usersContent');
            if (container) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-search"></i><p>Введите название предмета для поиска</p></div>`;
                document.getElementById('resultsCount').textContent = '0 пользователей';
            }
            adjustTriggerHeight();
        });
        window.addEventListener('resize', adjustTriggerHeight);

        document.getElementById('searchBtn')?.addEventListener('click', performSearch);
        document.getElementById('searchInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(); });
    </script>
</body>
</html>
