<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Поиск | Old Money Collections</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-logo" onclick="window.location.href='main.html';">
            <i class="fas fa-crown logo-icon"></i>
            <span class="logo-text">OLD MONEY</span>
            <span class="logo-sub">EST. 1905</span>
        </div>
    </header>

    <main>
        <div class="burger-container">
            <div class="burger">
                <button type="button" onclick="window.location.href='main.html';"><i class="fas fa-home"></i> Главная</button>
                <button type="button" onclick="window.location.href='favorite.html';"><i class="fas fa-heart"></i> Желаемое</button>
                <button type="button" class="active"><i class="fas fa-search"></i> Поиск</button>
                <button type="button" id="collapseMenuBtn"><i class="fas fa-compress-alt"></i> Свернуть</button>
            </div>
            <div class="burger-trigger" id="expandMenuBtn">
                <span class="trigger-icon">☰</span>
                <span>МЕНЮ</span>
            </div>
        </div>

        <div class="mainContainer" id="mainContainer">
            <div class="page-header">
                <h1><i class="fas fa-search"></i> Поиск предметов</h1>
            </div>
            <div class="search-section">
                <div class="search-box-wrapper">
                    <div class="search-input-group">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" class="search-input" id="searchInput" placeholder="Введите название предмета (например, «машинка», «hot wheels», «часы»)">
                    </div>
                    <button class="search-btn" id="searchBtn"><i class="fas fa-search"></i> Найти</button>
                </div>
            </div>
            <div class="results-header">
                <div class="results-count" id="resultsCount">0 пользователей</div>
                <div style="font-size: 13px; color: #8F826C;"><i class="fas fa-users"></i> Коллекционеры Old Money</div>
            </div>
            <div id="usersContent">
                <div class="skeleton skeleton-card" style="height: 100px; margin-bottom: 16px;"></div>
                <div class="skeleton skeleton-card" style="height: 100px; margin-bottom: 16px;"></div>
                <div class="skeleton skeleton-card" style="height: 100px;"></div>
            </div>
        </div>
    </main>

    <footer>
        <span>© 2026 OLD MONEY — Сообщество коллекционеров</span>
    </footer>

    <div class="modal" id="userItemsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Предметы коллекции</h3>
                <button class="modal-close" onclick="closeModal('userItemsModal')">&times;</button>
            </div>
            <div id="modalItemsList"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000';

        function getAuthHeaders() {
            const token = sessionStorage.getItem('token');
            return token ? { 'Authorization': `Bearer ${token}` } : {};
        }

        async function apiFetch(url, options = {}) {
            const res = await fetch(`${API_BASE}${url}`, {
                ...options,
                credentials: 'include',
                headers: { 'Content-Type': 'application/json', ...getAuthHeaders(), ...options.headers }
            });
            if (res.status === 302 || res.redirected) {
                sessionStorage.clear();
                window.location.href = 'logReg.html';
                throw new Error('Сессия истекла');
            }
            if (res.status === 401) {
                sessionStorage.clear();
                window.location.href = 'logReg.html';
                throw new Error('Не авторизован');
            }
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.message || err.error || `Ошибка ${res.status}`);
            }
            if (res.status === 204) {
                return null;
            }
            const data = await res.json();
            if (data && typeof data === 'object' && Array.isArray(data.items)) {
                return data.items;
            }
            return data;
        }

        function formatDate(dateStr) {
            if (!dateStr) return "";
            const d = new Date(dateStr);
            return d.toLocaleDateString('ru-RU');
        }

        function formatPrice(price) {
            return new Intl.NumberFormat('ru-RU').format(price) + " ₽";
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function showNotification(message, bgColor = '#2C4A3E') {
            const notif = document.createElement('div');
            notif.textContent = message;
            notif.style.cssText = `
                position: fixed;
                bottom: 80px;
                right: 20px;
                background: ${bgColor};
                color: white;
                padding: 12px 24px;
                border-radius: 40px;
                font-size: 14px;
                z-index: 1000;
                animation: slideIn 0.3s ease;
                box-shadow: 0 4px 12px var(--shadow);
            `;
            document.body.appendChild(notif);
            setTimeout(() => {
                notif.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notif.remove(), 300);
            }, 2000);
        }

        function getDeclension(n, one, two, five) {
            n = Math.abs(n) % 100;
            if (n >= 5 && n <= 20) return five;
            n %= 10;
            if (n === 1) return one;
            if (n >= 2 && n <= 4) return two;
            return five;
        }

        async function searchUsersByItem(query) {
            if (!query.trim()) return [];
            const q = query.trim().toLowerCase();
            const users = await apiFetch('/api/users/');
            const currentUserId = parseInt(sessionStorage.getItem('userId'));
            const results = [];
            for (const user of users) {
                if (user.id === currentUserId) continue;
                try {
                    const items = await apiFetch(`/api/users/${user.id}/items/`);
                    const matched = items.filter(item => item.name.toLowerCase().includes(q));
                    if (matched.length) {
                        results.push({ user, matchedItems: matched });
                    }
                } catch (err) {
                    console.warn(`Ошибка загрузки предметов пользователя ${user.id}:`, err);
                }
            }
            return results;
        }

        async function addToWishlist(userId, item) {
            try {
                await apiFetch(`/api/users/${userId}/items/${item.id}/wishlist/`, { method: 'POST' });
                showNotification('Добавлено в желаемое');
                localStorage.setItem('wishlistChanged', Date.now().toString());
            } catch (err) {
                showNotification('Ошибка: ' + err.message, '#D1664A');
            }
        }

        function renderUsers(results) {
            const container = document.getElementById('usersContent');
            const countSpan = document.getElementById('resultsCount');
            if (!container) return;
            if (!results || results.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-user-slash"></i><p>Пользователи не найдены</p><p class="empty-sub">Попробуйте изменить параметры поиска</p></div>`;
                if (countSpan) countSpan.textContent = '0 пользователей';
                return;
            }
            container.innerHTML = `<div class="users-grid">${results.map(res => {
                const user = res.user;
                const matchCount = res.matchedItems.length;
                return `
                <div class="user-card" data-user-id="${user.id}" data-query="${currentSearchQuery}">
                    <div class="user-avatar">${escapeHtml(user.initials || user.username.slice(0,2).toUpperCase())}</div>
                    <div class="user-info">
                        <div class="user-name">${escapeHtml(user.username)}</div>
                        <div class="user-stats">
                            <span><i class="fas fa-image"></i> ${user.total_items || '?'} предметов</span>
                            <span><i class="fas fa-search"></i> Найдено: ${matchCount}</span>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right" style="color: var(--gold);"></i>
                </div>
            `}).join('')}</div>`;
            if (countSpan) countSpan.textContent = `${results.length} ${getDeclension(results.length, 'пользователь', 'пользователя', 'пользователей')}`;
            
            document.querySelectorAll('.user-card').forEach(card => {
                card.addEventListener('click', async () => {
                    const userId = parseInt(card.dataset.userId);
                    const query = card.dataset.query;
                    await openUserItemsModal(userId, query);
                });
            });
        }

        async function openUserItemsModal(userId, query) {
            const modal = document.getElementById('userItemsModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalList = document.getElementById('modalItemsList');
            try {
                const user = await apiFetch(`/api/users/${userId}/`);
                let items = await apiFetch(`/api/users/${userId}/items/`);
                if (query && query.trim()) {
                    const q = query.trim().toLowerCase();
                    items = items.filter(item => item.name.toLowerCase().includes(q));
                }
                modalTitle.textContent = `Коллекция ${user.username} (${items.length} предметов)`;
                if (items.length === 0) {
                    modalList.innerHTML = '<div class="empty-state"><p>Нет предметов, соответствующих запросу.</p></div>';
                } else {
                    modalList.innerHTML = `
                        <table class="items-table">
                            <thead><tr><th>Название</th><th>Категория</th><th>Стоимость</th><th>Дата</th><th></th></tr></thead>
                            <tbody>
                                ${items.map(item => `
                                    <tr>
                                        <td>${escapeHtml(item.name)}</td>
                                        <td>${escapeHtml(item.category)}</td>
                                        <td>${formatPrice(item.price)}</td>
                                        <td>${formatDate(item.acquisition_date)}</td>
                                        <td><button class="add-to-wishlist-btn" data-user-id="${userId}" data-item='${JSON.stringify(item)}'><i class="fas fa-heart"></i> В желаемое</button></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                    document.querySelectorAll('.add-to-wishlist-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const userId = parseInt(btn.dataset.userId);
                            const item = JSON.parse(btn.dataset.item);
                            addToWishlist(userId, item);
                        });
                    });
                }
                modal.classList.add('active');
            } catch (err) {
                alert('Ошибка загрузки: ' + err.message);
            }
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }
        window.closeModal = closeModal;

        let currentSearchQuery = '';

        async function performSearch() {
            const searchInput = document.getElementById('searchInput');
            currentSearchQuery = searchInput?.value || '';
            const container = document.getElementById('usersContent');
            container.innerHTML = '<div class="skeleton skeleton-card" style="height: 100px;"></div>';
            try {
                const results = await searchUsersByItem(currentSearchQuery);
                renderUsers(results);
            } catch (err) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Ошибка поиска: ${err.message}</p></div>`;
            }
        }

        const mainElement = document.querySelector('main');
        const collapseMenuBtn = document.getElementById('collapseMenuBtn');
        const expandMenuBtn = document.getElementById('expandMenuBtn');
        function collapseMenu() { if (!mainElement.classList.contains('menu-collapsed')) { mainElement.classList.add('menu-collapsed'); localStorage.setItem('menuCollapsedSearch', 'true'); } }
        function expandMenu() { if (mainElement.classList.contains('menu-collapsed')) { mainElement.classList.remove('menu-collapsed'); localStorage.setItem('menuCollapsedSearch', 'false'); } }
        if (collapseMenuBtn) collapseMenuBtn.addEventListener('click', collapseMenu);
        if (expandMenuBtn) expandMenuBtn.addEventListener('click', expandMenu);
        if (localStorage.getItem('menuCollapsedSearch') === 'true') mainElement.classList.add('menu-collapsed');

        function adjustTriggerHeight() {
            const trigger = document.getElementById('expandMenuBtn');
            const mainCont = document.querySelector('.mainContainer');
            if (trigger && mainCont && window.innerWidth > 768) {
                trigger.style.minHeight = Math.min(Math.max(mainCont.offsetHeight, 250), 700) + 'px';
            }
        }

        window.addEventListener('load', async () => {
            if (!sessionStorage.getItem('userId') && !sessionStorage.getItem('token')) {
                window.location.href = 'logReg.html';
                return;
            }
            document.getElementById('usersContent').innerHTML = `<div class="empty-state"><i class="fas fa-search"></i><p>Введите название предмета для поиска</p></div>`;
            document.getElementById('resultsCount').textContent = '0 пользователей';
            adjustTriggerHeight();
        });
        window.addEventListener('resize', adjustTriggerHeight);

        document.getElementById('searchBtn')?.addEventListener('click', performSearch);
        document.getElementById('searchInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(); });
    </script>
</body>
</html>
